name: Build & Push

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::982563744386:role/medlit-github-deploy
  ECR_REGISTRY: 982563744386.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: medlit-prod

jobs:
  build:
    name: Build Docker image and push to ECR
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # required for OIDC authentication
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tags
        id: tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | head -c 8)
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: runtime
          push: true
          tags: |
            ${{ steps.tags.outputs.image }}:latest
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
